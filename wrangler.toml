name = "engram-fp-prod"
main = "src/index.ts"
compatibility_date = "2026-05-27"
compatibility_flags = ["nodejs_compat"]

# D1 binding (created in Task S1.2)
[[d1_databases]]
binding = "DB"
database_name = "engram-fingerprint"
database_id = "6d2bc3e1-aca7-4212-8160-fd668c866ffb"

# R2 binding (created in Task S1.3)
[[r2_buckets]]
binding = "PACKS"
bucket_name = "engram-fp-packs"

# Anti-poison threshold (Q5 — tunable without redeploy)
[vars]
POISON_CONFLICT_THRESHOLD = "0.70"

# WASM module rule: tells wrangler/Miniflare to serve .wasm files as CompiledWasm
# modules so they can be imported directly rather than fetched via file://.
[[rules]]
type = "CompiledWasm"
globs = ["**/*.wasm"]
fallthrough = true

# Cron triggers added in Cluster S6
# [triggers]
# crons = ["0 3 * * *", "0 4 * * *"]

name = "engram-fp-prod"
main = "src/index.ts"
compatibility_date = "2026-05-27"
compatibility_flags = ["nodejs_compat"]

# --- Domain migration (see README "Domain migration" + src/deprecation.ts) ------
# Only the config-relevant phases appear here (A/C/E); Phase B is the telemetry
# migration + dashboard gauge and Phase D is the engram client release.
# Phase A — owned host attached. engramfp.com's zone is on this Cloudflare account,
# so on deploy wrangler provisions DNS + the TLS cert and api.engramfp.com serves
# the SAME Worker/D1/R2 as the default *.workers.dev preview.
routes = [
  { pattern = "api.engramfp.com", custom_domain = true },
]

# Phase C — turn on the deprecation signal only AFTER api.engramfp.com is confirmed
# resolving: deploy this route, verify the host answers, THEN uncomment
# CANONICAL_HOST / SUNSET_DATE in [vars] below. (Setting it earlier would point the
# legacy host's clients at an address that doesn't resolve yet.)
#
# Phase E — retire the legacy preview host. Once the dashboard "Ingress hosts"
# gauge shows ~0 distinct contributors on the *.workers.dev host for a sustained
# window AND SUNSET_DATE has passed, set this and deploy to take the name-bearing
# host offline (reversible — flip back to re-enable):
# workers_dev = false

# D1 binding (created in Task S1.2)
[[d1_databases]]
binding = "DB"
database_name = "engram-fingerprint"
database_id = "6d2bc3e1-aca7-4212-8160-fd668c866ffb"

# R2 binding (created in Task S1.3)
[[r2_buckets]]
binding = "PACKS"
bucket_name = "engram-fp-packs"

# Per-pseudonym rate-limit safety valve for POST /v1/contribute. Ceiling sits
# ABOVE an honest client's peak (client _CONCURRENCY=5 ≈ 300–600 req/min) so real
# users never hit it — the limiter only bites on pathological rates. Best-effort
# per-colo counting; a circuit-breaker, not a security control. Read as optional
# in code (if (env.CONTRIBUTE_RATE_LIMITER)). period ∈ {10, 60}.
# namespace_id is a self-assigned integer unique to this account (per Cloudflare
# docs) -- NOT a dashboard-provisioned resource like a KV namespace. Nothing else
# uses 1001, so no collision. Validated deploy-side by the wrangler dry-run CI job.
[[ratelimits]]
name = "CONTRIBUTE_RATE_LIMITER"
namespace_id = "1001"
simple = { limit = 600, period = 60 }

# Tunable thresholds (no redeploy needed to change).
# IDENTIFY_MIN_SCORE: minimum combined_score for a /v1/identify candidate to be
# returned — below it the server reports no confident match (issue #3).
[vars]
POISON_CONFLICT_THRESHOLD = "0.70"
IDENTIFY_MIN_SCORE = "0.15"
# Domain-migration signal (Phase C). OFF until CANONICAL_HOST is set: every
# response served on the legacy *.workers.dev host then advertises the successor
# via Deprecation / Sunset / Link headers (src/deprecation.ts), which the engram
# client surfaces as an upgrade notice. SUNSET_DATE is the announced retirement
# date (HTTP-date, RFC 8594). Set CANONICAL_HOST to the host attached in `routes`
# above; leaving it unset keeps the signal inert, so this can ship pre-domain.
# CANONICAL_HOST = "api.engramfp.com"
# SUNSET_DATE = "Thu, 31 Dec 2026 23:59:59 GMT"

# WASM module rule: tells wrangler/Miniflare to serve .wasm files as CompiledWasm
# modules so they can be imported directly rather than fetched via file://.
[[rules]]
type = "CompiledWasm"
globs = ["**/*.wasm"]
fallthrough = true

# 30 * * * * — episode promotion (hourly, oldest-first, bounded by PROMOTION_BATCH_LIMIT);
# 0 3 * * * — disc promotion;  0 4 * * * — pack builder (R2 packs);
# 0 * * * * — hourly minhash sketch sweep (runSketchBuilder), decoupled so identify
# coverage keeps pace with intake (~63 sketches/run × 24 ≈ 1,512/day) within the 30s budget.
[triggers]
crons = ["0 3 * * *", "0 4 * * *", "0 * * * *", "30 * * * *"]

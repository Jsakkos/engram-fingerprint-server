name: Code Review

on:
  pull_request:
    types: [opened]

jobs:
  review:
    if: |
      github.event.pull_request.draft == false &&
      github.event.pull_request.user.login != 'dependabot[bot]'

    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request for correctness, security, and quality.
            See CONTRIBUTING.md for project conventions. This is a Cloudflare
            Worker (TypeScript) that ingests crowd-sourced audio fingerprints
            into D1 and serves canonical fingerprint packs from R2.

            Focus on:
            - Anti-poison pipeline: minhash screening thresholds
              (POISON_CONFLICT_THRESHOLD), exact-overlap confirmation, and
              flag_count / shadowban accounting.
            - D1 safety: parameterized queries (no string interpolation into
              SQL), the dedupe UNIQUE index assumptions, ON DELETE CASCADE
              behavior, and migration correctness.
            - Privacy: /v1/forget must delete by pseudonym while preserving
              canonical/aggregate data; never log or leak pseudonyms or PII.
            - Codec & sketch integrity: zstd+varint encode/decode roundtrips,
              minhash / Jaccard correctness, and R2 pack writes.
            - Zod validation completeness (UUIDv4, base64, confidence bounds,
              MATCH_SOURCE_ALLOWLIST) and idiomatic Cloudflare Workers usage.

            Note: The PR branch is already checked out in the current working directory.

            Use `gh pr comment` for top-level feedback.
            Use `mcp__github_inline_comment__create_inline_comment` (with
            `confirmed: true`) to flag specific lines of code.
            Only post GitHub comments — do not submit review text as messages.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
